services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-agent
    restart: unless-stopped
    ports:
      - "18789:18789"
      - "18791:18791"
    volumes:
      - ./data:/home/node/.openclaw
    environment:
      - NODE_ENV=production
      - OPENCLAW_GATEWAY_HOST=0.0.0.0
      - ZAI_API_KEY=82152843ff2b4b319f6a4a86a6220b1b.sUZb9fM45zvtl2Jp

  hocai-proxy:
    image: nginx:alpine
    container_name: hocai-proxy
    restart: unless-stopped
    ports:
      - "127.0.0.1:9099:9099"
    volumes:
      - ./data/hocai-nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9099/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
