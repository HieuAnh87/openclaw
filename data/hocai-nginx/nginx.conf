# Nginx reverse proxy: bypass Cloudflare WAF cho HOCAI API (danglamgiau.com)
# Fix IPv6: force DNS resolution via 8.8.8.8 with ipv6=off
resolver 8.8.8.8 valid=10s ipv6=off;

server {
    listen 9099;
    server_name danglamgiau.com;

    location / {
        # Variable-based proxy_pass: nginx resolves hostname at request time
        # 8.8.8.8 (ipv6=off) returns only IPv4 A record → bypasses IPv6 issue
        set $upstream danglamgiau.com;
        proxy_pass https://$upstream;

        # Keep Host header = hostname so Cloudflare routes correctly
        proxy_set_header Host danglamgiau.com;

        # SNI: tell Cloudflare this is for danglamgiau.com
        proxy_ssl_server_name on;

        # Override User-Agent → bypass Cloudflare bot detection
        proxy_set_header User-Agent "PostmanRuntime/7.36.0";
        proxy_set_header Accept "application/json";
        proxy_set_header Accept-Encoding "";

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
